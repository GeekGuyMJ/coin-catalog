    <!--
        Theme is applied BEFORE paint to prevent a flash of the wrong theme.
        We read localStorage here — no JS modules needed yet.
    -->
    <script>
        (function applyThemeEarly() {
            var saved = localStorage.getItem('cc-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    <script>
        // Error capture + splash control
        window._caughtErrors = [];
        window._bootComplete = false;
        window.onerror = function(msg, url, line) {
            window._caughtErrors.push({msg: msg, url: url, line: line});
            return false;
        };
        window.addEventListener('unhandledrejection', function(e) {
            var m = e.reason && e.reason.message ? e.reason.message : String(e.reason);
            window._caughtErrors.push({msg: m});
        });
        window._markBootComplete = function() {
            window._bootComplete = true;
            var s = document.getElementById('app-splash');
            if (s) { s.style.display = 'none'; s.classList.add('hidden'); }
        };
    </script>

    <script>
        // Cycle through coin images on each page load
        (function() {
            var coins = [
                '/images/coin_gold1.png',
                '/images/coin_gold_proof1.png',
                '/images/coin_silver1.png',
                '/images/coin_copper1.png',
                '/images/coin_copper_proof1.png',

                '/images/coin_bronze1.png',
                '/images/coin_bend1.png',
                '/images/coin_bend2.png',
                '/images/coin_bend3.png',
                '/images/coin_chocolate1.png',
                '/images/coin_chocolate2.png',
                '/images/coin_dirty1.png',
                '/images/coin_dirty2.png',
                '/images/coin_dirty3.png',
                '/images/coin_dirty4.png',
                '/images/coin_dirty5.png'
            ];
            var pick = coins[Math.floor(Math.random() * coins.length)];
            function setCoinImages() {
                var hdr = document.getElementById('header-coin-img');
                if (hdr) hdr.src = pick;
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', setCoinImages);
            } else {
                setCoinImages();
            }
        })();
    </script>

                            <div class="form-group">
                                <label for="inv-current-value">Current Value ($)</label>
                                <input type="number" id="inv-current-value" step="0.01" min="0" placeholder="0.00" class="form-input">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="inv-date-acquired">Date Acquired</label>
                            <input type="date" id="inv-date-acquired" class="form-input">
                        </div>

                        <div class="form-group">
                            <label for="inv-notes">Personal Notes</label>
                            <textarea id="inv-notes" rows="3" placeholder="Where did you get it? Any special provenance?" class="form-input" style="resize:vertical;"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>Personal Photo</label>
                            <div style="display:flex; gap:var(--space-2); align-items:center;">
                                <button type="button" class="btn-secondary" id="inv-btn-photo"> Upload Photo</button>
                                <span id="inv-photo-name" style="font-size:var(--font-size-xs); color:var(--color-text-muted);"></span>
                                <input type="file" id="inv-hidden-photo" accept="image/*" capture="environment" style="display:none;">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="justify-content:space-between;">
                    <button class="btn-secondary" data-action="close-modal">Cancel</button>
                    <button class="btn-primary" id="btn-save-inv" style="display:none;">Save Details</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast notification container -->
    <div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>

    <!-- ================================================================
         JavaScript — ES Modules
         Load order matters: utils → state → api → feature modules → main
    ================================================================ -->

</body>
</html>
